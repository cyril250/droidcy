name: Build Custom Offline APK

on:
  push:
    branches: [ "master", "updated-offline-launcher" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Check out Repository code
      uses: actions/checkout@v4
      with:
        ref: updated-offline-launcher

    - name: Set up Java Runtime JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Compile and Bundle Debug APK
      run: gradle assembleDebug -x test -x lint
