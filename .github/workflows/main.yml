name: Build Custom Offline APK

on:
  push:
    branches: [ "master", "updated-offline-launcher" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Check out Repository code
      uses: actions/checkout@v4
      with:
        ref: updated-offline-launcher

    - name: Set up Java Runtime JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Find Project Root and Compile APK
      run: |
        TARGET_DIR=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | xargs dirname)
        echo "Found Android project root at: $TARGET_DIR"
        cd "$TARGET_DIR"
        gradle assembleDebug -x test -x lint
