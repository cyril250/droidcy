name: Build Custom Offline APK

on:
  push:
    branches: [ "master", "updated-offline-launcher" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Check out Repository code
      uses: actions/checkout@v4
      with:
        ref: updated-offline-launcher

    - name: Set up Java Runtime JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make Gradle script executable
      run: chmod +x gradlew

    - name: Compile and Bundle Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK File
      uses: actions/upload-artifact@v4
      with:
        name: DroidBridge-Offline-Custom
        path: app/build/outputs/apk/debug/app-debug.apk
